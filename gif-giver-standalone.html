<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gif Giver - Teams GIF Search</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom animations to replace framer-motion */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        .animate-wiggle { animation: wiggle 2s infinite; }
    </style>
</head>
<body class="bg-[#F3F2F1] text-[#242424] font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons (replacing lucide-react for standalone)
        const SearchIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>);
        const CopyIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);
        const CheckIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>);
        const LoaderIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const InfoIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>);

        function App() {
            const [query, setQuery] = useState('');
            const [gifs, setGifs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [copiedId, setCopiedId] = useState(null);
            
            // ==========================================
            // PASTE YOUR GIPHY API KEY HERE
            // ==========================================
            const apiKey = "lfgvEVE912cJN4XwRnW7d0MpGAVF1rUQ"; 

            const searchGifs = async (e) => {
                if (e) e.preventDefault();
                if (!query.trim()) return;
                
                if (!apiKey || apiKey === "YOUR_GIPHY_API_KEY_HERE") {
                    setError('Please open the HTML file in a text editor and add your Giphy API Key at line 55.');
                    return;
                }

                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${apiKey}&q=${encodeURIComponent(query)}&limit=10&rating=g`);
                    const data = await response.json();
                    
                    if (data.meta.status !== 200) {
                        throw new Error(data.meta.msg || 'Failed to fetch GIFs');
                    }
                    
                    setGifs(data.data);
                } catch (err) {
                    setError(err.message || 'An error occurred while searching');
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = async (gif) => {
                try {
                    const gifUrl = gif.images.original.url;
                    setCopiedId(gif.id);

                    try {
                        // 1. Try modern Clipboard API first
                        const response = await fetch(gifUrl);
                        const blob = await response.blob();
                        
                        const dataUrl = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(blob);
                        });

                        const clipboardData = {
                            'text/plain': new Blob([gifUrl], { type: 'text/plain' }),
                            'text/html': new Blob([`<img src="${dataUrl}" alt="${gif.title || 'GIF'}" />`], { type: 'text/html' })
                        };

                        try {
                            const img = new Image();
                            img.crossOrigin = 'Anonymous';
                            img.src = gifUrl;
                            await new Promise((resolve, reject) => {
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    canvas.width = img.width;
                                    canvas.height = img.height;
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0);
                                    canvas.toBlob((pngBlob) => {
                                        if (pngBlob) clipboardData['image/png'] = pngBlob;
                                        resolve(null);
                                    }, 'image/png');
                                };
                                img.onerror = reject;
                            });
                        } catch (e) {}

                        const item = new ClipboardItem(clipboardData);
                        await navigator.clipboard.write([item]);
                    } catch (modernErr) {
                        console.warn('Modern clipboard API failed, trying legacy approach:', modernErr);
                        
                        // 2. Legacy fallback: document.execCommand('copy')
                        try {
                            const response = await fetch(gifUrl);
                            const blob = await response.blob();
                            const dataUrl = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onloadend = () => resolve(reader.result);
                                reader.readAsDataURL(blob);
                            });

                            const div = document.createElement('div');
                            div.contentEditable = 'true';
                            div.style.position = 'fixed';
                            div.style.left = '-9999px';
                            document.body.appendChild(div);
                            
                            const img = document.createElement('img');
                            img.src = dataUrl;
                            img.alt = gif.title || 'GIF';
                            div.appendChild(img);
                            
                            const range = document.createRange();
                            range.selectNodeContents(div);
                            const selection = window.getSelection();
                            selection.removeAllRanges();
                            selection.addRange(range);
                            
                            const success = document.execCommand('copy');
                            document.body.removeChild(div);
                            
                            if (!success) throw new Error('Legacy copy returned false');
                        } catch (legacyErr) {
                            await navigator.clipboard.writeText(gifUrl);
                        }
                    }

                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {
                    try {
                        await navigator.clipboard.writeText(gif.images.original.url);
                    } catch (e) {}
                    setTimeout(() => setCopiedId(null), 2000);
                }
            };

            return (
                <div>
                    <header className="bg-white border-b border-[#E1DFDD] py-6 px-4 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-[#6264A7] rounded-lg flex items-center justify-center shadow-md">
                                    <div className="animate-wiggle">
                                        <SearchIcon className="text-white w-6 h-6" />
                                    </div>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-[#242424]">Gif Giver</h1>
                                    <p className="text-xs text-[#605E5C] font-medium uppercase tracking-wider">GIF Search for Microsoft Teams</p>
                                </div>
                            </div>

                            <form onSubmit={searchGifs} className="flex-1 max-w-md relative group">
                                <input
                                    type="text"
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    placeholder="Search for GIFs (e.g. 'high five', 'coffee')"
                                    className="w-full pl-11 pr-4 py-2.5 bg-[#F3F2F1] border-2 border-transparent focus:border-[#6264A7] focus:bg-white rounded-xl outline-none transition-all duration-200 text-sm shadow-inner"
                                />
                                <SearchIcon className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#605E5C] group-focus-within:text-[#6264A7]" />
                                <button
                                    type="submit"
                                    disabled={loading || !query.trim()}
                                    className="absolute right-2 top-1/2 -translate-y-1/2 bg-[#6264A7] hover:bg-[#4B4D89] disabled:bg-[#C8C6C4] text-white px-4 py-1 rounded-lg text-xs font-semibold transition-colors shadow-sm flex items-center justify-center"
                                >
                                    {loading ? <LoaderIcon className="w-4 h-4 animate-spin" /> : 'Search'}
                                </button>
                            </form>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-6">
                        {error && (
                            <div className="mb-8 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm font-medium shadow-sm">
                                {error}
                            </div>
                        )}

                        {!loading && gifs.length === 0 && !error && (
                            <div className="flex flex-col items-center justify-center py-20 text-center animate-pop">
                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-6 shadow-lg border border-[#E1DFDD]">
                                    <SearchIcon className="w-10 h-10 text-[#C8C6C4]" />
                                </div>
                                <h2 className="text-xl font-bold text-[#242424]">Find the perfect GIF</h2>
                                <p className="text-[#605E5C] mt-2 max-w-xs">
                                    Search for a keyword above to get 10 high-quality GIFs ready for Teams.
                                </p>
                            </div>
                        )}

                        {loading && (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                {[...Array(10)].map((_, i) => (
                                    <div key={i} className="aspect-square bg-white rounded-xl animate-pulse border border-[#E1DFDD]"></div>
                                ))}
                            </div>
                        )}

                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            {gifs.map((gif) => (
                                <div key={gif.id} className="animate-pop group relative bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-[#E1DFDD] hover:-translate-y-1">
                                    <div className="aspect-square overflow-hidden bg-[#F3F2F1]">
                                        <img src={gif.images.fixed_height.url} alt={gif.title} referrerPolicy="no-referrer" className="w-full h-full object-cover" />
                                    </div>
                                    
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex flex-col items-center justify-center p-4 text-center">
                                        <button onClick={() => copyToClipboard(gif)} className="bg-white hover:bg-[#F3F2F1] text-[#242424] px-4 py-2 rounded-full font-bold text-xs flex items-center gap-2 shadow-lg transform scale-90 group-hover:scale-100 transition-transform duration-200">
                                            {copiedId === gif.id ? (
                                                <><CheckIcon className="w-4 h-4 text-green-600" /> Copied!</>
                                            ) : (
                                                <><CopyIcon className="w-4 h-4" /> Copy for Teams</>
                                            )}
                                        </button>
                                        <p className="text-white text-[10px] mt-3 font-medium opacity-80 line-clamp-2">
                                            {gif.title || 'Untitled GIF'}
                                        </p>
                                    </div>

                                    {copiedId === gif.id && (
                                        <div className="absolute top-2 right-2 bg-green-500 text-white p-1 rounded-full shadow-lg animate-pop">
                                            <CheckIcon className="w-3 h-3" />
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
